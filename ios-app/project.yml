name: MysplitwiseApp
options:
  bundleIdPrefix: com.mysplitwise
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: Configs/Debug.xcconfig
  Release: Configs/Release.xcconfig

packages:
  Supabase:
    url: https://github.com/supabase-community/supabase-swift
    from: 2.0.0
  MysplitwiseCore:
    path: MysplitwiseCore

targets:
  MysplitwiseApp:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: MysplitwiseApp
        excludes:
          - "App/Info.plist"
    info:
      path: MysplitwiseApp/App/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mysplitwise.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2" # iPhone + iPad
        ENABLE_PREVIEWS: true
    dependencies:
      - package: Supabase
        product: Auth
      - package: MysplitwiseCore

schemes:
  MysplitwiseApp:
    build:
      targets:
        MysplitwiseApp: all
    run:
      config: Debug
    archive:
      config: Release
