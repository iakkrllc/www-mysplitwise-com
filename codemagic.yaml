workflows:
  android-native-release:
    name: mysplitwise Android Native Release
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      groups:
        - google_play # add in Codemagic: GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
      vars:
        PACKAGE_NAME: "com.mysplitwise.app"
      java: 17
    scripts:
      - name: Build Android App Bundle
        script: |
          cd android-app
          ./gradlew bundleRelease
    artifacts:
      - android-app/app/build/outputs/**/*.aab
      - android-app/app/build/outputs/**/*.apk
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal # start on the internal track, promote manually once verified

  ios-native-release:
    name: mysplitwise iOS Native Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - app_store_credentials # add in Codemagic: App Store Connect API key
      vars:
        BUNDLE_ID: "com.mysplitwise.app"
        XCODE_PROJECT: "ios-app/MysplitwiseApp.xcodeproj"
        XCODE_SCHEME: "MysplitwiseApp"
      xcode: latest
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen
      - name: Generate Xcode project
        script: |
          cd ios-app
          xcodegen generate
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Build ipa
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration # configure the App Store Connect integration in Codemagic's UI
        submit_to_testflight: true
